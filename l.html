<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="l.css">
</head>
<body>

<div class="container">

    <div class="card">
        <div class="circle"></div>
        <img src="ChatGPT Image Jun 15, 2026, 03_15_53 PM (1).png"
            class="profile">

        <h2>F-Society</h2>
        <p>Hacker</p>

        <div class="stats">

            <div>
                <h3>100</h3>
                <span>Posts</span>
            </div>

            <div>
                <h3>940k</h3>
                <span>Followers</span>
            </div>

            <div>
                <h3>185</h3>
                <span>Following</span>
            </div>

        </div>

        <div class="buttons">
            <button class="follow">Follow</button>
            <button class="message">Message</button>
        </div>

    </div>

</div>

</body>
</html>
